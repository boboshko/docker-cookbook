services:
  caddy:
    image: ghcr.io/iarekylew00t/caddy-cloudflare:latest
    container_name: caddy-cloudflare
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"

    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}

    volumes:
      - /etc/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

    networks:
      - caddy-cloudflare

    healthcheck:
      test: ["CMD-SHELL", "pidof caddy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  caddy_data:
    external: true
    name: caddy-cloudflare-data

  caddy_config:
    external: true
    name: caddy-cloudflare-config

networks:
  caddy-cloudflare:
    external: true
    name: caddy-cloudflare
    driver: bridge
