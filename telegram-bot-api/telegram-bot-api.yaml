services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram-bot-api
    restart: unless-stopped

    ports:
      - "${TELEGRAM_HTTP_PORT:-8081}:8081"

    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: ${TELEGRAM_LOCAL:-1}
      TELEGRAM_HTTP_IP_ADDRESS: 0.0.0.0
      TELEGRAM_HTTP_PORT: ${TELEGRAM_HTTP_PORT:-8081}
      TELEGRAM_MAX_WEBHOOK_CONNECTIONS: ${TELEGRAM_MAX_WEBHOOK_CONNECTIONS:-100}
      TELEGRAM_MAX_CONNECTIONS: ${TELEGRAM_MAX_CONNECTIONS:-100000}
      TELEGRAM_VERBOSITY: ${TELEGRAM_VERBOSITY:-1}
      TELEGRAM_PROXY: ${TELEGRAM_PROXY:-}

    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
      - telegram-bot-api-temp:/tmp/telegram-bot-api

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -O /dev/null http://127.0.0.1:${TELEGRAM_HTTP_PORT:-8081} 2>&1 | grep -q 'HTTP/' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - telegram-bot-api

volumes:
  telegram-bot-api-data:
    external: true
  telegram-bot-api-temp:
    external: true

networks:
  telegram-bot-api:
    external: true
