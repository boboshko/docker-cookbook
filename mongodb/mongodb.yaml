services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: unless-stopped

    ports:
      - "${MONGO_EXTERNAL_PORT:-27017}:27017"

    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD:-admin}
      - MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE:-mydb}
      - TZ=${TIMEZONE:-UTC}

    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
      - mongodb-logs:/var/log/mongodb

    command: mongod --auth --logpath /var/log/mongodb/mongod.log

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - mongodb

volumes:
  mongodb-data:
    external: true
  mongodb-config:
    external: true
  mongodb-logs:
    external: true

networks:
  mongodb:
    external: true
